<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سفير بيو</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="bio-tag">BIO</span>
            <span class="brand-name">SAFIR</span>
        </div>
        <div class="cart-icon">
            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="سلة" width="30">
            <span class="cart-count">3</span>
        </div>
    </header>

    <main>
        <section class="welcome-section">
            <h1>مرحباً بكم في متجر سفير بيو</h1>
            <p>أفضل المنتجات الطبيعية والعضوية بين يديك</p>
        </section>

        <section class="products-grid">
            <script>
                for(let i=1; i<=9; i++) {
                    document.write(`
                        <div class="product-card" onclick="openProductPage(${i})">
                            <div class="product-image">
                                <img src="images/images${(i % 4) + 1}.jpg" alt="منتج ${i}">
                            </div>
                            <div class="product-info">
                                <h3>محفظة الجيب - موديل ${i}</h3>
                                <p class="price">150 د.م</p>
                                <button class="add-btn">عرض التفاصيل</button>
                            </div>
                        </div>
                    `);
                }
            </script>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="active">رئيسية</a>
        <a href="#">متجر</a>
        <a href="#">جريدة</a>
        <a href="#">إعدادات</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفير بيو - SAFIR BIO</title>
    <!-- ربط ملف CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head> 
<body>

    <!-- الهيدر (رأس الصفحة) -->
    <header>
        <div class="cart-icon-container">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge">3</span>
        </div>

        <div class="logo-container">
            <span class="logo-bio">BIO</span>
            <span class="logo-text">SAFIR</span>
        </div>
    </header>

    <main>
        <!-- قسم الترحيب -->
        <div class="hero-section">
            <h1>مرحباً بكم في متجر سفير بيو</h1>
            <p>أفضل المنتجات الطبيعية والعضوية بين يديك</p>
        </div>

        <!-- قسم عرض صور المنتجات (6 منتجات) -->
        <section class="products-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="images1.jpg" alt="منتج 1" onerror="this.src='https://via.placeholder.com/200x200?text=Product+1'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 1</h3>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images2.jpg" alt="منتج 2" onerror="this.src='https://via.placeholder.com/200x200?text=Product+2'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 2</h3>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images3.jpg" alt="منتج 3" onerror="this.src='https://via.placeholder.com/200x200?text=Product+3'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 3</h3>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images4.jpg" alt="منتج 4" onerror="this.src='https://via.placeholder.com/200x200?text=Product+4'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 4</h3>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images5.jpg" alt="منتج 5" onerror="this.src='https://via.placeholder.com/200x200?text=Product+5'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 5</h3>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images6.jpg" alt="منتج 6" onerror="this.src='https://via.placeholder.com/200x200?text=Product+6'">
                </div>
                <div class="product-info">
                    <h3>منتج طبيعي 6</h3>
                </div>
            </div>
        </section>
    </main>
    
    <!-- الفوتر (أسفل الصفحة) -->
    <footer class="main-footer">
        <nav class="footer-nav">
            <a href="index.html" class="footer-link">رئيسية</a>
            <a href="#" class="footer-link"> متجر </a>
            <a href="#" class="footer-link"> ورشة عمل </a>
            <a href="#" class="footer-link">إعدادات</a>
        </nav>
    </footer>

</body>
</html>
